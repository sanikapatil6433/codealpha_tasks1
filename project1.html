<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Gallery</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
    }

    h1{
      margin-bottom:20px;
      font-size:40px;
    }
    
    #themeBtn{

padding:10px 20px;

border:none;

border-radius:20px;

cursor:pointer;

margin-bottom:20px;

font-size:16px;

}


#search{

padding:10px;

width:250px;

border:none;

border-radius:20px;

outline:none;

font-size:16px;

margin-bottom:20px;

}


.light-mode{

background:#f5f5f5;

color:black;

}
    /* Filter Buttons */
    .filters{
      margin-bottom:30px;
    }

    .filters button{
      padding:10px 20px;
      margin:5px;
      border:none;
      background:#333;
      color:white;
      cursor:pointer;
      border-radius:5px;
      transition:0.3s;
      font-size:16px;
    }

    .filters button:hover,
    .filters .active{
      background:#ff9800;
    }

    /* Gallery Layout */
    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:15px;
    }

   .gallery-item:hover{

transform:translateY(-8px);

box-shadow:

0 10px 25px

rgba(255,152,0,0.5);

}


.gallery-item:hover img{

transform:scale(1.1);

filter:brightness(70%);

}
    .gallery-item img{
      width:100%;
      height:250px;
      object-fit:cover;
      display:block;
      transition:transform 0.5s ease, filter 0.5s ease;
    }

    /* Hover Effect */
    .gallery-item:hover img{
      transform:scale(1.1);
      filter:brightness(70%);
    }

    /* Lightbox */
    .lightbox{
      position:fixed;
      top:0;
      left:0;
      width:100%; 
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .lightbox img{
      width:80%;
      max-width:800px;
      border-radius:10px;
      animation:zoom 0.4s ease;
    }

    @keyframes zoom{
      from{
        transform:scale(0.7);
      }
      to{
        transform:scale(1);
      }
    }

    .close{
      position:absolute;
      top:20px;
      right:30px;
      font-size:40px;
      cursor:pointer;
      color:white;
    }

    .prev,
    .next{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      background:rgba(255,255,255,0.2);
      color:white;
      border:none;
      padding:15px;
      font-size:24px;
      cursor:pointer;
      border-radius:50%;
    }

    .prev{
      left:30px;
    }

    .next{
      right:30px;
    }

    .prev:hover,
    .next:hover{
      background:#ff9800;
    }

    /* Responsive */
    @media(max-width:768px){

      h1{
        font-size:28px;
      }

      .lightbox img{
        width:95%;
      }

      .prev,
      .next{
        padding:10px;
        font-size:18px;
      }
    }
  </style>
</head>

<body>

🌙 Dark Mode

    <div class="gallery-item animals">
      <img src="https://images.unsplash.com/photo-1503256207526-0d5d80fa2f47?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Y3V0ZSUyMGRvZ3xlbnwwfHwwfHx8MA%3D%3D" alt="">

    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox">
    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img class="lightbox-img" src="" alt="">

    <button class="next">&#10095;</button>
  </div>

  <script>
    const galleryItems = document.querySelectorAll(".gallery-item img");
    const lightbox = document.querySelector(".lightbox");
    const lightboxImg = document.querySelector(".lightbox-img");
    const closeBtn = document.querySelector(".close");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;

    // Open Lightbox
    galleryItems.forEach((img, index) => {
      img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.style.display = "flex";
      });
    });

    // Show Image
    function showImage() {
      lightboxImg.src = galleryItems[currentIndex].src;
    }

    // Next Image
    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % galleryItems.length;
      showImage();
    });

    // Previous Image
    prevBtn.addEventListener("click", () => {
      currentIndex = (currentIndex - 1 + galleryItems.length) % galleryItems.length;
      showImage();
    });

    // Close Lightbox
    closeBtn.addEventListener("click", () => {
      lightbox.style.display = "none";
    });

    // Close when clicking outside image
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) {
        lightbox.style.display = "none";
      }
    });

    // Filter Function
    const filterButtons = document.querySelectorAll(".filters button");

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {

        document.querySelector(".filters .active")
          .classList.remove("active");

        button.classList.add("active");

        const filter = button.dataset.filter;

        document.querySelectorAll(".gallery-item")
          .forEach(item => {

            if (filter === "all" ||
                item.classList.contains(filter)) {

              item.style.display = "block";

            } else {

              item.style.display = "none";
            }
          });
      });
    });

    document.getElementById("count")

.innerHTML=

"Total Images : "

+galleryItems.length;

const themeBtn=

document.getElementById("themeBtn");

themeBtn.onclick=()=>{

document.body

.classList.toggle("light-mode");

};

document.getElementById("search")

.addEventListener(

"keyup",

function(){

let value=

this.value

.toLowerCase();

document.querySelectorAll(".gallery-item")

.forEach(item=>{

if(

item.className

.toLowerCase()

.includes(value)

){

item.style.display="block";

}

else{

item.style.display="none";

}

});

});

document

.addEventListener(

"keydown",

(e)=>{

if(

lightbox.style.display==="flex"

){

if(

e.key==="ArrowRight"

){

currentIndex=

(currentIndex+1)

%

galleryItems.length;

showImage();

}

if(

e.key==="ArrowLeft"

){

currentIndex=

(currentIndex-1+

galleryItems.length)

%

galleryItems.length;

showImage();

}

if(

e.key==="Escape"

){

lightbox.style.display="none";

}

}

});
  </script>
